<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: #0d0f1a;
    color: #F5F2E9;
    font-family: 'Inter', sans-serif;
  }

  /* Navbar */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    padding: 1.2rem 6vw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(13,15,26,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #F5F2E9;
  }

  .logo span { color: #C9A84C; }

  /* Hero */
  .hero {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 6vw;
    position: relative;
  }

  /* Glow sutil no centro */
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 60%, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    max-width: 600px;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #C9A84C;
    opacity: 0.8;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: #C9A84C;
    opacity: 0.5;
  }

  /* Headline */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 7vw, 3.8rem);
    line-height: 1.1;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #F5F2E9;
  }

  h1 .gold { color: #C9A84C; }

  /* Subhead */
  .subhead {
    font-family: 'Inter', sans-serif;
    font-size: clamp(0.9rem, 2vw, 1.05rem);
    font-weight: 300;
    color: rgba(245,242,233,0.55);
    line-height: 1.75;
    max-width: 36ch;
  }

  /* Divisor */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .divider-line {
    width: 40px;
    height: 1px;
    background: rgba(201,168,76,0.3);
  }

  .divider-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #C9A84C;
    opacity: 0.5;
  }

  /* Scroll cue */
  .scroll-cue {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(245,242,233,0.25);
  }

  .scroll-cue-line {
    width: 1px;
    height: 32px;
    background: linear-gradient(180deg, rgba(201,168,76,0.5), transparent);
    animation: scrollDown 1.8s ease-in-out infinite;
  }

  @keyframes scrollDown {
    0%, 100% { transform: scaleY(1); opacity: 0.5; }
    50% { transform: scaleY(1.3); opacity: 1; }
  }

  /* Próxima seção (pra mostrar que continua) */
  .next {
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #090b14;
    color: rgba(245,242,233,0.3);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header class="navbar">
  <div class="logo">Raséc <span>Mídias</span></div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="eyebrow">Barbacena, MG</div>
    <h1>Sem um site,<br>você <span class="gold">não existe</span><br>pra quem importa.</h1>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>
    <p class="subhead">Enquanto você não tem um site, alguém está te substituindo. A gente resolve isso de forma rápida e profissional.</p>
  </div>
  <div class="scroll-cue">
    <div class="scroll-cue-line"></div>
    role
  </div>
</section>

<div class="next">Próxima seção</div>

</body>
</html>
