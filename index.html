<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: #0d0f1a;
    color: #F5F2E9;
    font-family: 'Inter', sans-serif;
  }

  .hero {
    height: 100dvh;
    min-height: 560px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 6vw;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 40% at 50% 62%, rgba(201,168,76,0.09) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
    max-width: 560px;
    width: 100%;
  }

  @media (max-width: 600px) {
    .hero-inner { gap: 1.6rem; }
  }

  /* Logo */
  .hero-logo {
    width: clamp(260px, 78vw, 420px);
    height: auto;
    margin-bottom: 0.6rem;
    opacity: 0.95;
  }

  /* Eyebrow */
  .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #C9A84C;
    opacity: 0.75;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: #C9A84C;
    opacity: 0.45;
  }

  /* Headline */
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 8.5vw, 4.5rem);
    line-height: 1.08;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: #F5F2E9;
  }

  h1 .gold { color: #C9A84C; }

  /* Divisor */
  .divider {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .divider-line {
    width: 36px;
    height: 1px;
    background: rgba(201,168,76,0.3);
  }

  .divider-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #C9A84C;
    opacity: 0.45;
  }

  /* Subhead */
  .subhead {
    font-family: 'Inter', sans-serif;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 300;
    color: rgba(245,242,233,0.5);
    line-height: 1.75;
    max-width: 34ch;
  }

  /* Scroll cue */
  .scroll-cue {
    position: absolute;
    bottom: 1.8rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(245,242,233,0.2);
  }

  .scroll-cue-line {
    width: 1px;
    height: 28px;
    background: linear-gradient(180deg, rgba(201,168,76,0.45), transparent);
    animation: scrollDown 1.8s ease-in-out infinite;
  }

  @keyframes scrollDown {
    0%, 100% { opacity: 0.5; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  /* Próxima seção demo */
  .next {
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #090b14;
    color: rgba(245,242,233,0.2);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
</style>
</head>
