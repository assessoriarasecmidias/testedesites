<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MG Telas: Deixe suas crianças livres. Proteção premium com garantia de 5 anos. Instalação em 48h. 500+ famílias protegidas.">
    <meta name="keywords" content="redes de proteção, telas mosquiteiras, proteção infantil, segurança para pets">
    <meta property="og:title" content="MG Telas | Proteção Premium para Sua Família">
    <meta property="og:description" content="Deixe suas crianças livres. A gente fica com a preocupação. Proteção profissional com garantia de 5 anos.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mgtelasdeprotecao.com">
    <meta name="theme-color" content="#0f172a">
    <meta name="author" content="MG Telas de Proteção">
    
    <title>MG Telas | Proteção Premium para Crianças e Pets | Garantia 5 Anos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-dark: #0f172a;
            --color-dark-secondary: #1e293b;
            --color-white: #ffffff;
            --color-gray-50: #f9fafb;
            --color-gray-100: #f3f4f6;
            --color-gray-200: #e5e7eb;
            --color-gray-300: #d1d5db;
            --color-gray-600: #4b5563;
            --color-gray-700: #374151;
            --color-text: #1f2937;
            --color-text-light: #6b7280;
            --color-accent: #10b981;
            --color-accent-dark: #059669;
            --color-accent-light: #d1fae5;
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --spacing-2xl: 4rem;
            --spacing-3xl: 6rem;
            
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            background: var(--color-white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            line-height: 1.15;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: clamp(2rem, 5vw, 2.5rem);
            letter-spacing: -0.01em;
        }

        h3 {
            font-size: clamp(1.5rem, 3vw, 1.75rem);
        }

        h4 {
            font-size: 1.125rem;
            font-weight: 600;
        }

        p {
            font-size: 1rem;
            color: var(--color-text-light);
            line-height: 1.7;
        }

        .text-accent { color: var(--color-accent); }
        .text-white { color: var(--color-white); }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
        }

        .header-inner {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-white);
            text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-accent {
            color: var(--color-accent);
        }

        .btn-header {
            background: var(--color-accent);
            color: var(--color-white);
            padding: 0.75rem 1.75rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-header:hover {
            background: var(--color-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(16, 185, 129, 0.25);
        }

        @media (max-width: 768px) {
            header {
                height: 70px;
                padding: 0 var(--spacing-md);
            }

            .btn-header {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }

        /* ===== HERO SECTION ===== */
        .hero {
            margin-top: 80px;
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-dark-secondary) 100%);
            color: var(--color-white);
            padding: var(--spacing-3xl) var(--spacing-lg);
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .hero-inner {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 7vw, 4rem);
            margin-bottom: var(--spacing-lg);
            line-height: 1.1;
        }

        .hero-text p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: var(--spacing-lg);
            line-height: 1.6;
            font-weight: 300;
        }

        .hero-benefits {
            display: grid;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        .benefit-icon {
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.25rem;
        }

        .hero-buttons {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .btn {
            padding: 1.1rem 2.75rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--color-accent);
            color: var(--color-white);
        }

        .btn-primary:hover {
            background: var(--color-accent-dark);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-white);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .hero-image {
            width: 100%;
            height: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .hero-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, transparent 100%);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-placeholder {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            text-align: center;
            z-index: 0;
        }

        @media (max-width: 1024px) {
            .hero {
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .hero-inner {
                grid-template-columns: 1fr;
                gap: var(--spacing-2xl);
            }

            .hero-image {
                height: 350px;
            }
        }

        @media (max-width: 768px) {
            .hero {
                margin-top: 70px;
                min-height: auto;
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .hero-text h1 {
                font-size: 2rem;
            }

            .hero-text p {
                font-size: 1rem;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .hero-image {
                height: 250px;
            }
        }

        /* ===== SEÇÃO BASE ===== */
        section {
            padding: var(--spacing-3xl) var(--spacing-lg);
        }

        .section-inner {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
        }

        .section-header h2 {
            margin-bottom: var(--spacing-md);
        }

        .section-header p {
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            section {
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .section-header {
                margin-bottom: var(--spacing-2xl);
            }
        }

        /* ===== TRUST BAR ===== */
        .trust-bar {
            background: var(--color-white);
            padding: var(--spacing-2xl) var(--spacing-lg);
            border-bottom: 1px solid var(--color-gray-200);
        }

        .trust-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: var(--spacing-xl);
            text-align: center;
        }

        .trust-item h4 {
            color: var(--color-accent);
            margin-bottom: var(--spacing-xs);
            font-size: 1.5rem;
        }

        .trust-item p {
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .trust-bar {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .trust-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-lg);
            }
        }

        /* ===== PROBLEMA ===== */
        .problema {
            background: var(--color-white);
        }

        .problema-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
        }

        .problema-image {
            width: 100%;
            height: 450px;
            background: var(--color-gray-100);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .problema-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .problema-text h2 {
            margin-bottom: var(--spacing-lg);
            color: var(--color-text);
        }

        .problema-list {
            display: grid;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .problema-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: #fef3c7;
            border-radius: var(--radius-md);
            border-left: 4px solid #f59e0b;
        }

        .problema-item::before {
            content: '⚠';
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .problema-item p {
            margin: 0;
            color: var(--color-text);
            font-weight: 500;
        }

        @media (max-width: 1024px) {
            .problema-inner {
                grid-template-columns: 1fr;
            }

            .problema-image {
                height: 300px;
            }
        }

        @media (max-width: 768px) {
            .problema-inner {
                grid-template-columns: 1fr;
            }

            .problema-image {
                height: 250px;
            }
        }

        /* ===== SOLUÇÃO ===== */
        .solucao {
            background: var(--color-gray-50);
        }

        .solucao-inner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
        }

        .solucao-text h2 {
            margin-bottom: var(--spacing-lg);
            color: var(--color-text);
        }

        .solucao-list {
            display: grid;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .solucao-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-lg);
            background: var(--color-white);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--color-accent);
        }

        .solucao-item::before {
            content: '✓';
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .solucao-item p {
            margin: 0;
            font-weight: 500;
        }

        .solucao-image {
            width: 100%;
            height: 450px;
            background: var(--color-gray-100);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            order: -1;
        }

        .solucao-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            .solucao-inner {
                grid-template-columns: 1fr;
            }

            .solucao-image {
                height: 300px;
                order: 0;
            }
        }

        /* ===== SERVIÇOS ===== */
        .servicos {
            background: var(--color-white);
        }

        .servicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-3xl);
        }

        .servico-card {
            background: var(--color-white);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .servico-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.05) 0%, transparent 100%);
            opacity: 0;
            transition: var(--transition);
            pointer-events: none;
        }

        .servico-card:hover {
            border-color: var(--color-accent);
            box-shadow: var(--shadow-lg);
            transform: translateY(-4px);
        }

        .servico-card:hover::before {
            opacity: 1;
        }

        .servico-icon {
            width: 56px;
            height: 56px;
            background: var(--color-accent-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: var(--spacing-md);
            position: relative;
            z-index: 1;
        }

        .servico-card h4 {
            position: relative;
            z-index: 1;
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .servico-card p {
            position: relative;
            z-index: 1;
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
        }

        .servico-link {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            transition: var(--transition);
        }

        .servico-link:hover {
            gap: var(--spacing-sm);
        }

        @media (max-width: 768px) {
            .servicos-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== COMO FUNCIONA ===== */
        .como-funciona {
            background: var(--color-gray-50);
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .step {
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 64px;
            height: 64px;
            background: var(--color-accent);
            color: var(--color-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            margin: 0 auto var(--spacing-lg);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }

        .step h4 {
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .step p {
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .steps-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== DIFERENCIAIS ===== */
        .diferenciais {
            background: var(--color-white);
        }

        .diferenciais-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .diferencial {
            padding: var(--spacing-xl);
            background: var(--color-gray-50);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--color-accent);
            transition: var(--transition);
            cursor: pointer;
        }

        .diferencial:hover {
            transform: translateX(8px);
            box-shadow: var(--shadow-md);
        }

        .diferencial h4 {
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .diferencial p {
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .diferenciais-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== PORTFÓLIO ===== */
        .portfolio {
            background: var(--color-white);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-3xl);
        }

        .portfolio-item {
            background: var(--color-gray-100);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            height: 350px;
            position: relative;
            border: 1px solid var(--color-gray-200);
            transition: var(--transition);
        }

        .portfolio-item:hover {
            transform: scale(1.02);
            border-color: var(--color-accent);
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .portfolio-item:hover img {
            transform: scale(1.05);
        }

        .portfolio-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
            color: #9ca3af;
            font-size: 0.95rem;
            text-align: center;
            padding: var(--spacing-lg);
        }

        .portfolio-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
            padding: var(--spacing-lg);
            color: var(--color-white);
            transform: translateY(50px);
            transition: var(--transition);
        }

        .portfolio-item:hover .portfolio-info {
            transform: translateY(0);
        }

        .portfolio-info h4 {
            margin: 0;
            color: var(--color-white);
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }

            .portfolio-item {
                height: 250px;
            }
        }

        /* ===== DEPOIMENTOS ===== */
        .depoimentos {
            background: var(--color-gray-50);
        }

        .depoimentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-3xl);
        }

        .depoimento {
            background: var(--color-white);
            padding: var(--spacing-xl);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-gray-200);
            transition: var(--transition);
        }

        .depoimento:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--color-accent);
        }

        .depoimento-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .depoimento-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--color-accent), #06b6d4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--color-white);
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .depoimento-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .depoimento-meta h4 {
            margin: 0 0 var(--spacing-xs);
            font-size: 1rem;
            color: var(--color-text);
        }

        .depoimento-city {
            font-size: 0.85rem;
            color: var(--color-text-light);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .depoimento-stars {
            color: #f59e0b;
            font-size: 0.9rem;
            margin-bottom: var(--spacing-md);
        }

        .depoimento-text {
            font-size: 0.95rem;
            line-height: 1.7;
            font-style: italic;
            color: var(--color-text-light);
            margin: 0;
        }

        @media (max-width: 768px) {
            .depoimentos-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== GARANTIAS ===== */
        .garantias {
            background: var(--color-white);
        }

        .garantias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .garantia {
            text-align: center;
            padding: var(--spacing-xl);
        }

        .garantia-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .garantia h4 {
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .garantia p {
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .garantias-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== FAQ ===== */
        .faq {
            background: var(--color-gray-50);
        }

        .faq-content {
            max-width: 800px;
            margin: var(--spacing-3xl) auto 0;
        }

        .faq-item {
            background: var(--color-white);
            border: 1px solid var(--color-gray-200);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            overflow: hidden;
            transition: var(--transition);
        }

        .faq-item.active {
            border-color: var(--color-accent);
            box-shadow: var(--shadow-md);
        }

        .faq-question {
            padding: var(--spacing-lg);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--color-text);
            transition: var(--transition);
            user-select: none;
        }

        .faq-question:hover {
            background: var(--color-gray-50);
            color: var(--color-accent);
        }

        .faq-icon {
            width: 24px;
            height: 24px;
            background: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-white);
            font-size: 0.75rem;
            font-weight: bold;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .faq-item.active .faq-icon {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .faq-answer.show {
            max-height: 500px;
        }

        .faq-answer-content {
            padding: 0 var(--spacing-lg) var(--spacing-lg);
            color: var(--color-text-light);
            line-height: 1.8;
        }

        /* ===== CTA FINAL ===== */
        .cta-final {
            background: linear-gradient(135deg, var(--color-accent) 0%, #059669 100%);
            color: var(--color-white);
            padding: var(--spacing-3xl) var(--spacing-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-final::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-final-inner {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .cta-final h2 {
            color: var(--color-white);
            margin-bottom: var(--spacing-md);
        }

        .cta-final p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: var(--spacing-xl);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-urgencia {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: var(--spacing-lg);
            font-weight: 500;
        }

        .btn-final {
            background: var(--color-white);
            color: var(--color-accent);
            padding: 1.25rem 3rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-final:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .cta-final {
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .cta-final h2 {
                font-size: 1.75rem;
            }

            .btn-final {
                width: 100%;
                justify-content: center;
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--color-dark);
            color: rgba(255, 255, 255, 0.7);
            padding: var(--spacing-xl) var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }

        .footer-section h4 {
            color: var(--color-white);
            margin-bottom: var(--spacing-md);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: var(--spacing-sm);
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .footer-section a:hover {
            color: var(--color-accent);
        }

        .footer-bottom {
            text-align: center;
            padding-top: var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            footer {
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .footer-content {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-lg);
            }
        }
