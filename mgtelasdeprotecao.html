<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MG Telas: Proteção inteligente para sua família. Redes de proteção premium, instalação perfeita, garantia de 5 anos. Solicite seu orçamento hoje.">
    <meta name="keywords" content="redes de proteção, telas mosquiteiras, proteção para crianças, proteção para pets">
    <meta property="og:title" content="MG Telas - Proteção Premium para Sua Família">
    <meta property="og:description" content="Redes de proteção com acabamento impecável e garantia de 5 anos. Instalação rápida em sua região.">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#0f172a">
    
    <title>MG Telas | Proteção Premium para Sua Família | Garantia 5 Anos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-dark: #0f172a;
            --color-dark-secondary: #1e293b;
            --color-white: #ffffff;
            --color-gray-light: #f8fafc;
            --color-gray-medium: #e2e8f0;
            --color-gray-dark: #64748b;
            --color-accent: #10b981;
            --color-accent-hover: #059669;
            --color-text: #1e293b;
            --color-text-secondary: #475569;
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --spacing-2xl: 4rem;
            --spacing-3xl: 6rem;
            
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--color-text);
            background: var(--color-white);
            line-height: 1.6;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            line-height: 1.2;
        }

        h1 { font-size: clamp(2.5rem, 5vw, 4rem); }
        h2 { font-size: clamp(2rem, 4vw, 3rem); }
        h3 { font-size: clamp(1.25rem, 3vw, 1.75rem); }
        h4 { font-size: 1.125rem; }
        p { font-size: 1rem; color: var(--color-text-secondary); }

        /* ===== HEADER ===== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            height: 80px;
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
        }

        .header-content {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-white);
            text-decoration: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--color-accent);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: var(--spacing-lg);
            align-items: center;
        }

        nav a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--color-accent);
        }

        .btn-header {
            background: var(--color-accent);
            color: var(--color-white);
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .btn-header:hover {
            background: var(--color-accent-hover);
            transform: translateY(-2px);
        }

        /* ===== HERO ===== */
        .hero {
            margin-top: 80px;
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-dark-secondary) 100%);
            color: var(--color-white);
            overflow: hidden;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at right, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-3xl) var(--spacing-lg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero-text h1 {
            color: var(--color-white);
            margin-bottom: var(--spacing-md);
            line-height: 1.1;
        }

        .hero-text h1 .highlight {
            color: var(--color-accent);
        }

        .hero-subheadline {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: var(--spacing-lg);
            line-height: 1.6;
            font-weight: 300;
        }

        .hero-benefits {
            display: grid;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-xl);
        }

        .benefit {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .benefit::before {
            content: '✓';
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .hero-buttons {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--color-accent);
            color: var(--color-white);
            padding: 1rem 2.5rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-primary:hover {
            background: var(--color-accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--color-white);
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 1rem 2.5rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-secondary:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        .hero-image {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 500px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
        }

        .hero-image::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1rem;
        }

        /* ===== TRUST BAR ===== */
        .trust-bar {
            background: var(--color-white);
            padding: var(--spacing-lg) var(--spacing-lg);
            border-bottom: 1px solid var(--color-gray-medium);
        }

        .trust-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-xl);
            text-align: center;
        }

        .trust-item h4 {
            color: var(--color-accent);
            margin-bottom: var(--spacing-xs);
        }

        .trust-item p {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        /* ===== SECTION STYLES ===== */
        section {
            padding: var(--spacing-3xl) var(--spacing-lg);
        }

        .section-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--spacing-3xl);
        }

        .section-header h2 {
            margin-bottom: var(--spacing-md);
        }

        .section-header p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== PROBLEMA ===== */
        .problema {
            background: var(--color-white);
        }

        .problema-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
        }

        .problema-image {
            height: 450px;
            background: var(--color-gray-light);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .problema-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .problema-text h3 {
            color: var(--color-dark);
            margin-bottom: var(--spacing-md);
        }

        .problema-list {
            display: grid;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .problema-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-gray-light);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--color-accent);
        }

        .problema-item::before {
            content: '⚠';
            color: var(--color-accent);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .problema-item p {
            margin: 0;
        }

        /* ===== SOLUÇÃO ===== */
        .solucao {
            background: var(--color-gray-light);
        }

        .solucao-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
        }

        .solucao-text h3 {
            margin-bottom: var(--spacing-md);
        }

        .solucao-list {
            display: grid;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .solucao-item {
            display: flex;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            background: var(--color-white);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--color-accent);
        }

        .solucao-item::before {
            content: '✓';
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .solucao-item p {
            margin: 0;
        }

        .solucao-image {
            height: 450px;
            background: var(--color-white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .solucao-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== SERVIÇOS ===== */
        .servicos {
            background: var(--color-white);
        }

        .servicos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-lg);
        }

        .servico-card {
            background: var(--color-white);
            border: 1px solid var(--color-gray-medium);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .servico-card:hover {
            border-color: var(--color-accent);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .servico-icon {
            width: 56px;
            height: 56px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: var(--spacing-md);
        }

        .servico-card h4 {
            margin-bottom: var(--spacing-sm);
            color: var(--color-text);
        }

        .servico-card p {
            flex: 1;
            margin-bottom: var(--spacing-md);
            font-size: 0.95rem;
        }

        .servico-card a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
            width: fit-content;
        }

        .servico-card a:hover {
            gap: var(--spacing-sm);
        }

        /* ===== COMO FUNCIONA ===== */
        .como-funciona {
            background: var(--color-gray-light);
        }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .step {
            text-align: center;
        }

        .step-number {
            width: 64px;
            height: 64px;
            background: var(--color-accent);
            color: var(--color-white);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 auto var(--spacing-md);
        }

        .step h4 {
            margin-bottom: var(--spacing-sm);
        }

        .step p {
            font-size: 0.95rem;
        }

        /* ===== DIFERENCIAIS ===== */
        .diferenciais {
            background: var(--color-white);
        }

        .diferenciais-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .diferencial {
            padding: var(--spacing-xl);
            background: var(--color-gray-light);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--color-accent);
            transition: var(--transition);
        }

        .diferencial:hover {
            transform: translateX(8px);
        }

        .diferencial h4 {
            margin-bottom: var(--spacing-sm);
        }

        .diferencial p {
            font-size: 0.95rem;
            margin: 0;
        }

        /* ===== PORTFÓLIO ===== */
        .portfolio {
            background: var(--color-white);
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-3xl);
        }

        .portfolio-item {
            background: var(--color-gray-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            height: 350px;
            position: relative;
            border: 1px solid var(--color-gray-medium);
        }

        .portfolio-item:hover {
            transform: scale(1.02);
            border-color: var(--color-accent);
        }

        .portfolio-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .portfolio-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .portfolio-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: var(--spacing-lg);
            color: var(--color-white);
            transform: translateY(20px);
            transition: var(--transition);
        }

        .portfolio-item:hover .portfolio-info {
            transform: translateY(0);
        }

        .portfolio-info h4 {
            margin: 0;
            color: var(--color-white);
        }

        /* ===== DEPOIMENTOS ===== */
        .depoimentos {
            background: var(--color-gray-light);
        }

        .depoimentos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-3xl);
        }

        .depoimento {
            background: var(--color-white);
            padding: var(--spacing-xl);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-gray-medium);
            transition: var(--transition);
        }

        .depoimento:hover {
            box-shadow: var(--shadow-xl);
            border-color: var(--color-accent);
        }

        .depoimento-header {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .depoimento-avatar {
            width: 56px;
            height: 56px;
            background: var(--color-gray-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--color-accent);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .depoimento-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .depoimento-meta h4 {
            margin: 0 0 var(--spacing-xs);
            font-size: 1rem;
        }

        .depoimento-city {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .depoimento-stars {
            color: #f59e0b;
            font-size: 0.9rem;
            margin-bottom: var(--spacing-md);
        }

        .depoimento-text {
            font-size: 0.95rem;
            line-height: 1.7;
            font-style: italic;
            color: var(--color-text-secondary);
            margin: 0;
        }

        /* ===== ESTATÍSTICAS ===== */
        .estatisticas {
            background: linear-gradient(135deg, var(--color-dark) 0%, var(--color-dark-secondary) 100%);
            color: var(--color-white);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--spacing-xl);
            margin-top: var(--spacing-3xl);
        }

        .stat {
            text-align: center;
            padding: var(--spacing-xl);
        }

        .stat-number {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            color: var(--color-accent);
            margin-bottom: var(--spacing-sm);
        }

        .stat-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        /* ===== ATENDIMENTO ===== */
        .atendimento {
            background: var(--color-white);
        }

        .atendimento-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-3xl);
            align-items: center;
        }

        .atendimento-text h3 {
            margin-bottom: var(--spacing-md);
        }

        .atendimento-list {
            display: grid;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
        }

        .atendimento-item {
            display: flex;
            gap: var(--spacing-md);
            align-items: flex-start;
        }

        .atendimento-item::before {
            content: '→';
            color: var(--color-accent);
            font-weight: bold;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .atendimento-image {
            height: 450px;
            background: var(--color-gray-light);
            border-radius: var(--radius-xl);
            border: 1px solid var(--color-gray-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .atendimento-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== FAQ ===== */
        .faq {
            background: var(--color-gray-light);
        }

        .faq-content {
            max-width: 800px;
            margin: 0 auto;
            margin-top: var(--spacing-3xl);
        }

        .faq-item {
            background: var(--color-white);
            border: 1px solid var(--color-gray-medium);
            border-radius: var(--radius-md);
            margin-bottom: var(--spacing-md);
            overflow: hidden;
            transition: var(--transition);
        }

        .faq-item.active {
            border-color: var(--color-accent);
            box-shadow: var(--shadow-md);
        }

        .faq-question {
            padding: var(--spacing-lg);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            color: var(--color-text);
            transition: var(--transition);
            user-select: none;
        }

        .faq-question:hover {
            background: var(--color-gray-light);
        }

        .faq-icon {
            width: 24px;
            height: 24px;
            background: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-white);
            font-size: 0.75rem;
            font-weight: bold;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .faq-item.active .faq-icon {
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .faq-answer.show {
            max-height: 1000px;
        }

        .faq-answer-content {
            padding: 0 var(--spacing-lg) var(--spacing-lg);
            color: var(--color-text-secondary);
            line-height: 1.8;
        }

        /* ===== CTA FINAL ===== */
        .cta-final {
            background: linear-gradient(135deg, var(--color-accent) 0%, #059669 100%);
            color: var(--color-white);
            text-align: center;
            padding: var(--spacing-3xl) var(--spacing-lg);
            position: relative;
            overflow: hidden;
        }

        .cta-final::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-final-content {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .cta-final h2 {
            color: var(--color-white);
            margin-bottom: var(--spacing-md);
        }

        .cta-final p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: var(--spacing-xl);
        }

        .btn-cta-final {
            background: var(--color-white);
            color: var(--color-accent);
            padding: 1.25rem 3rem;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .btn-cta-final:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--color-dark);
            color: rgba(255, 255, 255, 0.7);
            padding: var(--spacing-xl) var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }

        .footer-section h4 {
            color: var(--color-white);
            margin-bottom: var(--spacing-md);
            font-size: 1rem;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section li {
            margin-bottom: var(--spacing-sm);
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .footer-section a:hover {
            color: var(--color-accent);
        }

        .footer-bottom {
            text-align: center;
            padding-top: var(--spacing-lg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            header {
                height: 70px;
                padding: 0 var(--spacing-md);
            }

            nav ul {
                gap: var(--spacing-md);
            }

            nav a {
                font-size: 0.85rem;
            }

            .hero {
                margin-top: 70px;
            }

            .hero-content {
                grid-template-columns: 1fr;
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .hero-image {
                height: 400px;
            }

            .problema-content,
            .solucao-content,
            .atendimento-content {
                grid-template-columns: 1fr;
            }

            .problema-image,
            .solucao-image,
            .atendimento-image {
                height: 300px;
            }

            section {
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .section-header {
                margin-bottom: var(--spacing-2xl);
            }

            .hero-content {
                gap: var(--spacing-2xl);
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 0 var(--spacing-md);
            }

            nav {
                display: none;
            }

            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }

            .hero-content {
                padding: var(--spacing-2xl) var(--spacing-md);
            }

            .hero-buttons {
                flex-direction: column;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                justify-content: center;
            }

            .trust-content {
                gap: var(--spacing-lg);
                grid-template-columns: 1fr 1fr;
            }

            .servicos-grid,
            .portfolio-grid,
            .depoimentos-grid,
            .diferenciais-grid,
            .stats-grid,
            .steps-grid,
            .footer-content {
                grid-template-columns: 1fr;
            }

            section {
                padding: var(--spacing-xl) var(--spacing-md);
            }

            .section-header {
                margin-bottom: var(--spacing-2xl);
            }
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .servico-card,
        .depoimento,
        .step,
        .diferencial,
        .portfolio-item {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .servico-card:nth-child(1) { animation-delay: 0.1s; }
        .servico-card:nth-child(2) { animation-delay: 0.2s; }
        .servico-card:nth-child(3) { animation-delay: 0.3s; }
        .servico-card:nth-child(4) { animation-delay: 0.4s; }
        .servico-card:nth-child(5) { animation-delay: 0.5s; }
        .servico-card:nth-child(6) { animation-delay: 0.6s; }

        .depoimento:nth-child(1) { animation-delay: 0.1s; }
        .depoimento:nth-child(2) { animation-delay: 0.2s; }
        .depoimento:nth-child(3) { animation-delay: 0.3s; }
        .depoimento:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
